version: "3.8"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aurangabad-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      # Add other env vars here (e.g., MONGO_URI)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aurangabad-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
